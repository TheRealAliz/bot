name: Scrape Laravel and Send to Bale

on:
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run scraper
        run: python scrape_laravel.py
      
      - name: Send HTML to Bale
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          # Send the HTML file to Bale
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document="@laravel.html" \
            -F caption="📄 Laravel.com homepage
