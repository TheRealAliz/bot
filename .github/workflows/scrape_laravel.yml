name: Scrape and Save Laravel.com

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Run scraper
        run: python scrape_laravel.py
      
      - name: Create ZIP archive
        run: |
          zip -r laravel_complete_site.zip laravel_docs/
          echo "ZIP size: $(du -h laravel_complete_site.zip)"
      
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laravel-html-css-js
          path: laravel_complete_site.zip
          retention-days: 90
      
      - name: Send to Bale Messenger
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          # Send ZIP file
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document="@laravel_complete_site.zip" \
            -F caption="✅ Laravel.com scraped successfully!
