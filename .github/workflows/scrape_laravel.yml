name: Scrape and Send HTML to Bale

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch laravel.com HTML
        run: |
          curl -s -L -H "User-Agent: Mozilla/5.0" https://laravel.com -o laravel.html
          echo "✅ Downloaded HTML ($(wc -c < laravel.html) bytes)"
      
      - name: Send to Bale
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          curl -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document="@laravel.html" \
            -F caption="📄 Laravel.com homepage

📅 Scraped: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
📊 Size: $(wc -c < laravel.html) bytes
🔗 Source: https://laravel.com"
