name: Scrape Laravel and Send to Bale

on:
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run scraper
        run: python scrape_laravel.py
      
      - name: Send HTML to Bale
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          # Send the HTML file to Bale
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document="@laravel.html" \
            -F caption="📄 Laravel.com homepage
          
📊 File size: $(wc -c < laravel.html) bytes
⏰ Scraped: $(date)
🔗 Source: https://laravel.com"
          
          echo "✅ HTML file sent to Bale!"
      
      - name: Also send as text (if file is small)
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          # Send first 4000 characters as text message
          head -c 4000 laravel.html > preview.txt
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="📝 HTML Preview (first 4000 characters):
          
$(cat preview.txt)
          
... (full HTML file sent as document above)"
      
      - name: Upload to GitHub Artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: laravel-html
          path: laravel.html
          retention-days: 30
