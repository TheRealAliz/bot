name: Scrape Laravel.com Website

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silences the warning

jobs:
  scrape-website:
    runs-on: ubuntu-latest
    
    steps:
      # Using latest versions (maintainers will update these for Node 24)
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run web scraper
        run: |
          python scrape_laravel.py
      
      - name: Send notification to Bale
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="✅ Laravel.com scrape completed! Files are ready."
