name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Download video
        run: |
          yt-dlp -f "best[height<=480]" \
            -o "video.%(ext)s" \
            "${{ inputs.video_url }}"

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: '*.mp4'
