name: Download with yt-dlp

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3.1.2
        # FFmpeg و aria2 به صورت خودکار تنظیم می‌شوند

      - name: Download video
        run: yt-dlp https://www.youtube.com/watch?v=DTi8wZ1a1TA
