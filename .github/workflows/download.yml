name: Download YouTube Video

on:
  workflow_dispatch:  # اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pytube
        run: |
          python -m pip install --upgrade pip
          pip install pytube

      - name: Download video
        run: |
          python -c "
          from pytube import YouTube
          import os
          
          url = 'https://www.youtube.com/watch?v=2AwGnD7cGI4'
          yt = YouTube(url)
          video = yt.streams.get_highest_resolution()
          video.download(output_path='./downloads')
          print('Download completed!')
          "
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: ./downloads/
