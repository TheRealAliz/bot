name: Python YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install yt-dlp
        run: pip install yt-dlp
      
      - name: Run downloader
        run: |
          python youtube_downloader.py "${{ inputs.video_url }}"
      
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
          retention-days: 7
