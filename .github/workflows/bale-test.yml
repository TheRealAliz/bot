# .github/workflows/bale-test.yml
name: Send Hello World to Bale

# Allows you to run this workflow manually from the Actions tab
on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Send a test message via Bale API
        env:
          BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
        run: |
          # Using the official Bale API endpoint as per docs: https://tapi.bale.ai/bot<token>/METHOD_NAME
          curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="Hello from GitHub Actions! Your Bale bot is working perfectly. (Test via API)"
